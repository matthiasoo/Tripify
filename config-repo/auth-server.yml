server:
  port: 9000

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:h2:mem:tripify-auth
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
  instance:
    preferIpAddress: true

app:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000}
  frontend-redirect-uri: ${FRONTEND_REDIRECT_URI:http://localhost:3000/callback}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
