server:
  port: 9000

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:postgresql://${DB_IP:34.116.184.100}:5432/tripify-auth
    driverClassName: org.postgresql.Driver
    username: postgres
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: -1
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false
    hibernate:
      ddl-auto: none

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
  instance:
    preferIpAddress: true

app:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000}
  frontend-redirect-uri: ${FRONTEND_REDIRECT_URI:http://localhost:3000/callback}
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
