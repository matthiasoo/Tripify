server.port=8081
spring.application.name=backend
spring.threads.virtual.enabled=true

# API Keys (to be filled later)
api.openweather.url=https://api.openweathermap.org/data/2.5
api.openweather.key=dummy-key

api.foursquare.url=https://api.foursquare.com/v3
api.foursquare.key=dummy-key

api.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
api.gemini.key=dummy-key

# H2 Database Config for basic start
spring.datasource.url=jdbc:h2:mem:tripify
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.profiles.include=secrets
