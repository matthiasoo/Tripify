server.port=8081
spring.application.name=backend
spring.threads.virtual.enabled=true

api.openweather.url=https://api.openweathermap.org/data/2.5
api.openweather.key=${API_OPENWEATHER_KEY:}

api.foursquare.url=https://api.foursquare.com/v3
api.foursquare.key=${API_FOURSQUARE_KEY:}

api.unsplash.key=${API_UNSPLASH_KEY:}

spring.datasource.url=jdbc:h2:mem:tripify
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.profiles.include=secrets
