spring.cloud.config.enabled=false
spring.config.import=

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

api.openweather.url=https://api.openweathermap.org/data/2.5
api.openweather.key=dummy
api.unsplash.key=dummy
api.gemini.model=gemini-2.5-flash
api.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/${api.gemini.model}:generateContent
api.gemini.key=dummy
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9000/oauth2/jwks
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000
