services:
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: tripify-eureka
    ports:
      - "8761:8761"
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tripify-ai-service
    ports:
      - "8082:8082"
    environment:
      - GROQ_API_KEY=${API_GROQ_KEY}
    env_file:
      - ./backend/.env
    depends_on:
      - eureka-server
    restart: unless-stopped

  backend:
    depends_on:
      - eureka-server
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripify-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/swagger-ui/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8081
    container_name: tripify-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
