services:
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: tripify-config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    restart: unless-stopped

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: tripify-eureka
    ports:
      - "8761:8761"
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
    depends_on:
      - config-server
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tripify-ai-service
    ports:
      - "8082:8082"
    environment:
      - GROQ_API_KEY=${API_GROQ_KEY}
      - CONFIG_SERVER_URL=http://config-server:8888
    env_file:
      - ./backend/.env
    depends_on:
      - config-server
      - eureka-server
    restart: unless-stopped

  currency-converter:
    build:
      context: ./currency-converter
      dockerfile: Dockerfile
    container_name: tripify-currency-converter
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      - eureka-server
    restart: unless-stopped


  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    container_name: tripify-auth-server
    ports:
      - "9000:9000"
    environment:
      - AUTH_ISSUER_URI=http://localhost:9000
      - FRONTEND_REDIRECT_URI=http://localhost:3000/callback
      - FRONTEND_ORIGIN=http://localhost:3000
      - CONFIG_SERVER_URL=http://config-server:8888
    env_file:
      - ./backend/.env
    depends_on:
      - config-server
      - eureka-server
    restart: unless-stopped

  backend:
    depends_on:
      - config-server
      - eureka-server
      - auth-server
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripify-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - AUTH_JWK_SET_URI=http://auth-server:9000/oauth2/jwks
      - AUTH_ISSUER_URI=http://localhost:9000
      - CONFIG_SERVER_URL=http://config-server:8888
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/swagger-ui/index.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8081
        - NEXT_PUBLIC_AUTH_URL=http://localhost:9000
    container_name: tripify-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
      auth-server:
        condition: service_started
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: tripify-sonarqube
    ports:
      - "9001:9000"
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    restart: unless-stopped
