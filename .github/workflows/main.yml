name: CI - Tripify (Java Backend + JS Frontend)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # backend check
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Java (JDK)
        uses: actions/setup-java@v4
        with:
          java-version: '21' 
          distribution: 'temurin'
          cache: maven 

      - name: Budowanie i testy backendu
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean test # Uruchamia testy aplikacji Java

  # frontend check
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja i Build Frontendu
        working-directory: ./frontend
        run: |
          npm install
          npm run build

  # docker check
  docker-check:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Budowanie obrazu Backend (Java)
        working-directory: ./backend
        run: docker build . --file Dockerfile

      - name: Budowanie obrazu Frontend (Next.js)
        working-directory: ./frontend
        run: docker build . --file Dockerfile
